name: check
on:
  pull_request:
    paths:
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.sql"
  push:
    branches: [main]
    paths:
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.sql"

jobs:
  validate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install toolkit
        run: |
          pip install git+https://github.com/dataciviclab/lab-connectors.git
          pip install git+https://github.com/dataciviclab/toolkit.git

      - name: Validate all dataset configs parse correctly
        run: |
          for cfg in $(find . -path '*/anagrafica/*' -name dataset.yml | sort); do
            echo "→ $cfg"
            python3 -m toolkit.cli.app inspect paths --config "$cfg" --year 2026 > /dev/null 2>&1
          done
          for cfg in $(find . \( -path '*/entrate/*' -o -path '*/uscite/*' \) -name dataset.yml | sort); do
            echo "→ $cfg"
            python3 -m toolkit.cli.app inspect paths --config "$cfg" --year 2025 > /dev/null 2>&1
          done
          for cfg in $(find . -path '*/cross/*' -name dataset.yml | sort); do
            echo "→ $cfg"
            python3 -m toolkit.cli.app inspect paths --config "$cfg" --year 2025 > /dev/null 2>&1
          done
          echo "✅ All configs valid"

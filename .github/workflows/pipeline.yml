name: pipeline
on:
  workflow_dispatch:
    inputs:
      sides:
        description: "Lato contabile (entrate, uscite, both)"
        default: "both"
        type: choice
        options:
          - both
          - entrate
          - uscite
      years:
        description: "Anni (es. 2025 o 2021,2022,2025 o all)"
        default: "all"
      smoke:
        description: "Smoke mode (--sample-rows 1000, root isolato in out/smoke/)"
        default: false
        type: boolean

jobs:
  siope-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install toolkit
        run: |
          pip install git+https://github.com/dataciviclab/lab-connectors.git
          pip install git+https://github.com/dataciviclab/toolkit.git

      - name: Seeds anagrafici
        run: |
          if ${{ inputs.smoke }}; then
            for d in anagrafica/anag-comparti anagrafica/anag-sottocomparti anagrafica/anag-enti anagrafica/anag-codgest-entrate anagrafica/anag-codgest-uscite anagrafica/anag-reg-prov; do
              python3 -m toolkit.cli.app run all --config $d/dataset.yml --sample-rows 1000
            done
          else
            make seeds
          fi

      - name: Run entrate
        if: inputs.sides != 'uscite'
        run: |
          FLAG="${{ inputs.smoke && '--sample-rows 1000' || '' }}"
          if [ "${{ inputs.years }}" = "all" ]; then YEARS="2021 2022 2023 2024 2025"
          else YEARS=$(echo "${{ inputs.years }}" | tr ',' ' '); fi
          for y in $YEARS; do
            echo "=== entrate $y $FLAG ==="
            python3 -m toolkit.cli.app run all --config entrate/dataset.yml --year "$y" $FLAG
          done

      - name: Run uscite
        if: inputs.sides != 'entrate'
        run: |
          FLAG="${{ inputs.smoke && '--sample-rows 1000' || '' }}"
          if [ "${{ inputs.years }}" = "all" ]; then YEARS="2021 2022 2023 2024 2025"
          else YEARS=$(echo "${{ inputs.years }}" | tr ',' ' '); fi
          for y in $YEARS; do
            echo "=== uscite $y $FLAG ==="
            python3 -m toolkit.cli.app run all --config uscite/dataset.yml --year "$y" $FLAG
          done

      - name: Run cross-comparto
        if: inputs.sides == 'both'
        # Il cross usa wildcard * nei path parquet (matcha tutti gli anni),
        # quindi un singolo anno basta. 
        # NOTA: senza --year il toolkit itera su tutti gli anni configurati.
        run: |
          FLAG="${{ inputs.smoke && '--sample-rows 1000' || '' }}"
          echo "=== cross $FLAG ==="
          python3 -m toolkit.cli.app run mart --config cross/dataset.yml --year 2025 $FLAG

      - name: Verify output (gate)
        if: ${{ !inputs.smoke }}
        env:
          LATO: ${{ inputs.sides == 'both' && 'all' || inputs.sides }}
          ANNO: ${{ inputs.years }}
        run: |
          python3 scripts/verify_output.py --lato "$LATO" --year "$ANNO" --ci

      - name: Auth GCP e sync a GCS
        if: ${{ !inputs.smoke }}
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "GCP_SA_KEY non configurata — salto GCS sync"
            exit 0
          fi
          # Supporta sia JSON raw che base64
          if echo "$GCP_SA_KEY" | python3 -c "import json,sys; json.load(sys.stdin)" 2>/dev/null; then
            printf '%s\n' "$GCP_SA_KEY" > /tmp/gcp-key.json
          else
            printf '%s\n' "$GCP_SA_KEY" | base64 -d > /tmp/gcp-key.json 2>/dev/null
          fi
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gsutil -m rsync -r out/data/mart/ gs://dataciviclab-mart/siope/
          echo "✅ Synced to gs://dataciviclab-mart/siope/"

      - name: Sync clean a GCS
        if: ${{ !inputs.smoke }}
        run: |
          gsutil -m rsync -r out/data/clean/ gs://dataciviclab-clean/siope/
          echo "✅ Clean synced to gs://dataciviclab-clean/siope/"

      - name: Upload mart artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: siope-mart${{ inputs.smoke && '-smoke' || '' }}
          path: ${{ inputs.smoke && 'out/smoke/data/mart/' || 'out/data/mart/' }}
          compression-level: 0
          if-no-files-found: warn

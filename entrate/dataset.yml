root: "../out"
schema_version: 1

dataset:
  name: "siope_entrate_comuni"
  years: [2021, 2022, 2023, 2024, 2025]

raw:
  extractor:
    type: "unzip_first_csv"
  sources:
    - name: "siope_entrate_open"
      type: "http_file"
      args:
        url: "https://www.siope.it/documenti/siope2/open/last/SIOPE_ENTRATE.{year}.zip"
        filename: "SIOPE_ENTRATE.{year}.zip"
      primary: true
    # Anagrafica SIOPE vive nei dataset separati sotto `anagrafica/`.

clean:
  sql: "sql/clean.sql"
  read:
    mode: "latest"
    header: false
    delim: ","
    encoding: "utf-8"
    columns:
      column0: "VARCHAR"
      column1: "VARCHAR"
      column2: "VARCHAR"
      column3: "VARCHAR"
      column4: "VARCHAR"
  required_columns:
    - codice_ente
    - anno
    - periodo
    - codice_voce
    - importo
    - importo_eur
    - denominazione_ente
    - tipo_ente
    - codice_provincia
    - provincia
    - regione
    - codice_comparto
    - descrizione_comparto
    - is_titolo_9
    - macro_categoria_v2
    - descrizione_codice
    - has_codgest_match
  validate:
    min_rows: 3000000
    primary_key: ["codice_ente", "anno", "periodo", "codice_voce"]
    not_null: ["codice_ente", "anno", "periodo", "codice_voce", "importo"]

mart:
  tables:
    # --- PRO: comuni, province, città metropolitane ---
    - name: "siope_entrate_comuni_agg_labeled"
      sql: "sql/mart_PRO_agg_labeled.sql"
    # --- REG: regioni e province autonome ---
    - name: "siope_entrate_regioni_agg_labeled"
      sql: "sql/mart_REG_agg_labeled.sql"
    # --- SAN: ASL, AO, IRCCS, policlinici ---
    - name: "siope_entrate_sanita_agg_labeled"
      sql: "sql/mart_SAN_agg_labeled.sql"
    # --- UNI: università e dipartimenti ---
    - name: "siope_entrate_universita_agg_labeled"
      sql: "sql/mart_UNI_agg_labeled.sql"
  hierarchy:
    axis: "territoriale"
    levels:
      # PRO hierarchy (comuni → provincia → regione)
      - level: "comune_macro"
        table: "h_entrate_comune_macro"
        grain: ["anno", "codice_ente", "denominazione_ente", "codice_provincia", "provincia", "regione", "macro_categoria_v2"]
        source_table: "siope_entrate_comuni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
      - level: "provincia_macro"
        table: "h_entrate_provincia_macro"
        grain: ["anno", "codice_provincia", "provincia", "regione", "macro_categoria_v2"]
        source_table: "siope_entrate_comuni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
      - level: "regione_macro"
        table: "h_entrate_regione_macro"
        grain: ["anno", "regione", "macro_categoria_v2"]
        source_table: "siope_entrate_comuni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
      # REG hierarchy (solo regioni)
      - level: "regione"
        table: "h_entrate_regioni"
        grain: ["anno", "codice_ente", "denominazione_ente", "regione"]
        source_table: "siope_entrate_regioni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti", "popolazione"]
  required_tables:
    - "siope_entrate_comuni_agg_labeled"
    - "siope_entrate_regioni_agg_labeled"
    - "siope_entrate_sanita_agg_labeled"
    - "siope_entrate_universita_agg_labeled"
  validate:
    table_rules:
      siope_entrate_comuni_agg_labeled:
        min_rows: 300000
        required_columns: ["codice_ente", "anno", "codice_voce", "importo_totale", "importo_totale_eur", "descrizione_codice", "has_codgest_match", "is_titolo_9", "macro_categoria_v2", "codice_provincia", "provincia", "regione"]
        primary_key: ["codice_ente", "anno", "codice_voce"]
        not_null: ["codice_ente", "anno", "codice_voce", "importo_totale", "importo_totale_eur", "macro_categoria_v2"]
      siope_entrate_regioni_agg_labeled:
        min_rows: 50
        required_columns: ["codice_ente", "anno", "importo_totale_eur", "codice_comparto", "tipo_ente", "regione"]
        primary_key: ["codice_ente", "anno", "codice_voce"]
      siope_entrate_sanita_agg_labeled:
        min_rows: 50
        required_columns: ["codice_ente", "anno", "importo_totale_eur", "codice_comparto", "tipo_ente", "regione"]
        primary_key: ["codice_ente", "anno", "codice_voce"]
      siope_entrate_universita_agg_labeled:
        min_rows: 20
        required_columns: ["codice_ente", "anno", "importo_totale_eur", "codice_comparto", "tipo_ente"]
        primary_key: ["codice_ente", "anno", "codice_voce"]

validation:
  fail_on_error: true

support:
  - name: "comparti"
    config: "../anagrafica/anag-comparti/dataset.yml"
    years: [2026]
  - name: "sottocomparti"
    config: "../anagrafica/anag-sottocomparti/dataset.yml"
    years: [2026]
  - name: "enti"
    config: "../anagrafica/anag-enti/dataset.yml"
    years: [2026]
  - name: "codgest_entrate"
    config: "../anagrafica/anag-codgest-entrate/dataset.yml"
    years: [2026]
  - name: "regprov"
    config: "../anagrafica/anag-reg-prov/dataset.yml"
    years: [2026]

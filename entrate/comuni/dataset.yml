root: "../../out"
schema_version: 1

dataset:
  name: "siope_entrate_comuni"
  years: [2021, 2022, 2023, 2024, 2025]
  # La fonte SIOPE aperta usata qui espone anche il 2025 con copertura fino al
  # periodo 12. Il perimetro tecnico viene esteso a 2021-2025 per fissare una
  # base multi-anno piu stabile del progetto.

raw:
  extractor:
    type: "unzip_first_csv"
  sources:
    - name: "siope_entrate_open"
      type: "http_file"
      args:
        url: "https://www.siope.it/documenti/siope2/open/last/SIOPE_ENTRATE.{year}.zip"
        filename: "SIOPE_ENTRATE.{year}.zip"
      primary: true
    # `uscite` resta fuori dalla v1.
    # L'anagrafica SIOPE vive in dataset separati sotto `anagrafica/`.

clean:
  sql: "sql/clean.sql"
  read:
    mode: "latest"
    header: false
    delim: ","
    encoding: "utf-8"
    columns:
      column0: "VARCHAR"
      column1: "VARCHAR"
      column2: "VARCHAR"
      column3: "VARCHAR"
      column4: "VARCHAR"
  required_columns:
    - codice_ente
    - anno
    - periodo
    - codice_voce
    - importo
  validate:
    # Soglia mantenuta allineata a snapshot annuali completi: la fonte 2025
    # oggi supera comunque questa soglia.
    min_rows: 3000000
    primary_key: ["codice_ente", "anno", "periodo", "codice_voce"]
    not_null: ["codice_ente", "anno", "periodo", "codice_voce", "importo"]

mart:
  tables:
    - name: "siope_entrate_comuni"
      sql: "sql/mart_comuni.sql"
    - name: "siope_entrate_comuni_agg"
      sql: "sql/mart_comuni_agg.sql"
    - name: "siope_entrate_comuni_agg_labeled"
      sql: "sql/mart_comuni_agg_labeled.sql"
  hierarchy:
    axis: "territoriale"
    levels:
      - level: "comune_macro"
        table: "h_entrate_comune_macro"
        grain: ["codice_ente", "denominazione_ente", "codice_provincia", "provincia", "regione", "macro_categoria_v2"]
        source_table: "siope_entrate_comuni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
      - level: "provincia_macro"
        table: "h_entrate_provincia_macro"
        grain: ["codice_provincia", "provincia", "regione", "macro_categoria_v2"]
        source_table: "siope_entrate_comuni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
      - level: "regione_macro"
        table: "h_entrate_regione_macro"
        grain: ["regione", "macro_categoria_v2"]
        source_table: "siope_entrate_comuni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
  required_tables: ["siope_entrate_comuni", "siope_entrate_comuni_agg", "siope_entrate_comuni_agg_labeled"]
  validate:
    table_rules:
      siope_entrate_comuni:
        min_rows: 3000000
        required_columns: ["codice_ente", "anno", "periodo", "codice_voce", "importo", "codice_comparto", "tipo_ente"]
        primary_key: ["codice_ente", "anno", "periodo", "codice_voce", "importo"]
        not_null: ["codice_ente", "anno", "periodo", "codice_voce", "importo", "codice_comparto", "tipo_ente"]
      siope_entrate_comuni_agg:
        min_rows: 300000
        required_columns: ["codice_ente", "anno", "codice_voce", "importo_totale", "periodi_coperti", "codice_comparto"]
        primary_key: ["codice_ente", "anno", "codice_voce"]
        not_null: ["codice_ente", "anno", "codice_voce", "importo_totale", "periodi_coperti", "codice_comparto"]
      siope_entrate_comuni_agg_labeled:
        min_rows: 300000
        required_columns: ["codice_ente", "anno", "codice_voce", "importo_totale", "importo_totale_eur", "descrizione_codice", "has_codgest_match", "is_titolo_9", "macro_categoria_v2", "codice_provincia", "provincia", "regione"]
        primary_key: ["codice_ente", "anno", "codice_voce"]
        not_null: ["codice_ente", "anno", "codice_voce", "importo_totale", "importo_totale_eur", "macro_categoria_v2"]

validation:
  fail_on_error: true

support:
  - name: "comparti"
    config: "../../anagrafica/anag-comparti/dataset.yml"
    years: [2024]
  - name: "sottocomparti"
    config: "../../anagrafica/anag-sottocomparti/dataset.yml"
    years: [2024]
  - name: "enti"
    config: "../../anagrafica/anag-enti/dataset.yml"
    years: [2024]
  - name: "codgest_entrate"
    config: "../../anagrafica/anag-codgest-entrate/dataset.yml"
    years: [2024]
  - name: "regprov"
    config: "../../anagrafica/anag-reg-prov/dataset.yml"
    years: [2024]
  - name: "comuni"
    config: "../../anagrafica/anag-comuni/dataset.yml"
    years: [2024]


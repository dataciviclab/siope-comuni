root: "../out"
schema_version: 1

# Dataset cross-comparto: unisce tutti i comparti (PRO, REG, SAN, UNI)
# di entrate e uscite in una vista unica.
# Non ha raw/clean — legge direttamente dai mart di entrate/uscite.

dataset:
  name: "siope_cross_comparto"
  years: [2021, 2022, 2023, 2024, 2025]

mart:
  tables:
    - name: "siope_bilancio_unificato"
      sql: "sql/mart_bilancio_unificato.sql"
  required_tables: ["siope_bilancio_unificato"]
  validate:
    table_rules:
      siope_bilancio_unificato:
        min_rows: 10000
        required_columns:
          - lato
          - comparto
          - anno
          - codice_ente
          - denominazione_ente
          - regione
          - importo_totale_eur
        primary_key: ["lato", "comparto", "anno", "codice_ente", "codice_voce"]

validation:
  fail_on_error: true

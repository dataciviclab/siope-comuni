root: "../../out"
schema_version: 1

dataset:
  name: "siope_uscite_comuni"
  years: [2021, 2022, 2023, 2024, 2025]
  # V1 tecnica del lato uscite su comuni. Multi-year mart su 2021-2025.
  # La fonte open oggi espone anche il 2025.

raw:
  extractor:
    type: "unzip_first_csv"
  sources:
    - name: "siope_uscite_open"
      type: "http_file"
      args:
        url: "https://www.siope.it/documenti/siope2/open/last/SIOPE_USCITE.{year}.zip"
        filename: "SIOPE_USCITE.{year}.zip"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    mode: "latest"
    header: false
    delim: ","
    encoding: "utf-8"
    columns:
      column0: "VARCHAR"
      column1: "VARCHAR"
      column2: "VARCHAR"
      column3: "VARCHAR"
      column4: "VARCHAR"
  required_columns:
    - codice_ente
    - anno
    - periodo
    - codice_voce
    - importo
  validate:
    min_rows: 3000000
    primary_key: ["codice_ente", "anno", "periodo", "codice_voce"]
    not_null: ["codice_ente", "anno", "periodo", "codice_voce", "importo"]

mart:
  tables:
    - name: "siope_uscite_comuni"
      sql: "sql/mart_comuni.sql"
    - name: "siope_uscite_comuni_agg"
      sql: "sql/mart_comuni_agg.sql"
    - name: "siope_uscite_comuni_agg_labeled"
      sql: "sql/mart_comuni_agg_labeled.sql"
  hierarchy:
    axis: "territoriale"
    levels:
      - level: "comune"
        table: "h_uscite_comune"
        grain: ["anno", "codice_ente", "denominazione_ente", "codice_provincia", "provincia", "regione"]
        source_table: "siope_uscite_comuni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
      - level: "provincia"
        table: "h_uscite_provincia"
        grain: ["anno", "codice_provincia", "provincia", "regione"]
        source_table: "siope_uscite_comuni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
      - level: "regione"
        table: "h_uscite_regione"
        grain: ["anno", "regione"]
        source_table: "siope_uscite_comuni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
  required_tables: ["siope_uscite_comuni", "siope_uscite_comuni_agg", "siope_uscite_comuni_agg_labeled"]
  validate:
    table_rules:
      siope_uscite_comuni:
        min_rows: 3000000
        required_columns: ["codice_ente", "anno", "periodo", "codice_voce", "importo", "codice_comparto", "tipo_ente"]
        primary_key: ["codice_ente", "anno", "periodo", "codice_voce", "importo"]
        not_null: ["codice_ente", "anno", "periodo", "codice_voce", "importo", "codice_comparto", "tipo_ente"]
      siope_uscite_comuni_agg:
        min_rows: 300000
        required_columns: ["codice_ente", "anno", "codice_voce", "importo_totale", "periodi_coperti", "codice_comparto"]
        primary_key: ["codice_ente", "anno", "codice_voce"]
        not_null: ["codice_ente", "anno", "codice_voce", "importo_totale", "periodi_coperti", "codice_comparto"]
      siope_uscite_comuni_agg_labeled:
        min_rows: 300000
        required_columns: ["codice_ente", "anno", "codice_voce", "importo_totale", "importo_totale_eur", "descrizione_codice", "has_codgest_match", "codice_provincia", "provincia", "regione"]
        primary_key: ["codice_ente", "anno", "codice_voce"]
        not_null: ["codice_ente", "anno", "codice_voce", "importo_totale", "importo_totale_eur"]

validation:
  fail_on_error: true

support:
  - name: "comparti"
    config: "../../anagrafica/anag-comparti/dataset.yml"
    years: [2024]
  - name: "sottocomparti"
    config: "../../anagrafica/anag-sottocomparti/dataset.yml"
    years: [2024]
  - name: "enti"
    config: "../../anagrafica/anag-enti/dataset.yml"
    years: [2024]
  - name: "codgest_uscite"
    config: "../../anagrafica/anag-codgest-uscite/dataset.yml"
    years: [2024]
  - name: "regprov"
    config: "../../anagrafica/anag-reg-prov/dataset.yml"
    years: [2024]
  - name: "comuni"
    config: "../../anagrafica/anag-comuni/dataset.yml"
    years: [2024]


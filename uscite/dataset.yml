root: "../out"
schema_version: 1

dataset:
  name: "siope_uscite_comuni"
  years: [2021, 2022, 2023, 2024, 2025, 2026]

raw:
  extractor:
    type: "unzip_first_csv"
  sources:
    - name: "siope_uscite_open"
      type: "http_file"
      args:
        url: "https://www.siope.it/documenti/siope2/open/last/SIOPE_USCITE.{year}.zip"
        filename: "SIOPE_USCITE.{year}.zip"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    mode: "latest"
    header: false
    delim: ","
    encoding: "utf-8"
    columns:
      column0: "VARCHAR"
      column1: "VARCHAR"
      column2: "VARCHAR"
      column3: "VARCHAR"
      column4: "VARCHAR"
  required_columns:
    - codice_ente
    - anno
    - periodo
    - codice_voce
    - importo
    - importo_eur
    - denominazione_ente
    - tipo_ente
    - codice_provincia
    - provincia
    - regione
    - codice_comparto
    - descrizione_comparto
    - is_titolo_9
    - macro_area
    - macro_categoria
    - descrizione_codice
    - has_codgest_match
  validate:
    # Gate anticorruzione: soglia bassa per non bloccare anni parziali.
    # Il gate qualitativo vero è in verify_output.py (proporzionale per anno in corso).
    min_rows: 200000
    primary_key: ["codice_ente", "anno", "periodo", "codice_voce"]
    not_null: ["codice_ente", "anno", "periodo", "codice_voce", "importo"]

mart:
  tables:
    # --- PRO: comuni, province, città metropolitane ---
    - name: "siope_uscite_comuni_agg_labeled"
      sql: "sql/mart_PRO_agg_labeled.sql"
    # --- REG: regioni e province autonome ---
    - name: "siope_uscite_regioni_agg_labeled"
      sql: "sql/mart_REG_agg_labeled.sql"
    # --- SAN: ASL, AO, IRCCS, policlinici ---
    - name: "siope_uscite_sanita_agg_labeled"
      sql: "sql/mart_SAN_agg_labeled.sql"
    # --- UNI: università e dipartimenti ---
    - name: "siope_uscite_universita_agg_labeled"
      sql: "sql/mart_UNI_agg_labeled.sql"
  hierarchy:
    axis: "territoriale"
    levels:
      # PRO hierarchy (comuni → provincia → regione × macro_categoria)
      - level: "comune"
        table: "h_uscite_comune"
        grain: ["anno", "codice_ente", "denominazione_ente", "codice_provincia", "provincia", "regione", "macro_area", "macro_categoria"]
        source_table: "siope_uscite_comuni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
      - level: "provincia"
        table: "h_uscite_provincia"
        grain: ["anno", "codice_provincia", "provincia", "regione", "macro_area"]
        source_table: "siope_uscite_comuni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
      - level: "regione"
        table: "h_uscite_regione"
        grain: ["anno", "regione", "macro_area"]
        source_table: "siope_uscite_comuni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
      # REG hierarchy (solo regioni)
      - level: "regione"
        table: "h_uscite_regioni"
        grain: ["anno", "codice_ente", "denominazione_ente", "regione"]
        source_table: "siope_uscite_regioni_agg_labeled"
        exclude_metrics: ["importo_totale", "righe", "periodi_coperti"]
  required_tables:
    - "siope_uscite_comuni_agg_labeled"
    - "siope_uscite_regioni_agg_labeled"
    - "siope_uscite_sanita_agg_labeled"
    - "siope_uscite_universita_agg_labeled"
  validate:
    table_rules:
      siope_uscite_comuni_agg_labeled:
        min_rows: 100000
        required_columns: ["codice_ente", "anno", "codice_voce", "importo_totale", "importo_totale_eur", "macro_area", "macro_categoria", "is_titolo_9", "descrizione_codice", "has_codgest_match", "codice_provincia", "provincia", "regione"]
        primary_key: ["codice_ente", "anno", "codice_voce"]
        not_null: ["codice_ente", "anno", "codice_voce", "importo_totale", "importo_totale_eur"]
      siope_uscite_regioni_agg_labeled:
        min_rows: 50
        required_columns: ["codice_ente", "anno", "importo_totale_eur", "macro_area", "macro_categoria", "is_titolo_9", "codice_comparto", "tipo_ente", "regione"]
        primary_key: ["codice_ente", "anno", "codice_voce"]
      siope_uscite_sanita_agg_labeled:
        min_rows: 50
        required_columns: ["codice_ente", "anno", "importo_totale_eur", "macro_area", "macro_categoria", "is_titolo_9", "codice_comparto", "tipo_ente", "regione"]
        primary_key: ["codice_ente", "anno", "codice_voce"]
      siope_uscite_universita_agg_labeled:
        min_rows: 20
        required_columns: ["codice_ente", "anno", "importo_totale_eur", "macro_area", "macro_categoria", "is_titolo_9", "codice_comparto", "tipo_ente"]
        primary_key: ["codice_ente", "anno", "codice_voce"]

validation:
  fail_on_error: true

support:
  - name: "comparti"
    config: "../anagrafica/anag-comparti/dataset.yml"
    years: [2026]
  - name: "sottocomparti"
    config: "../anagrafica/anag-sottocomparti/dataset.yml"
    years: [2026]
  - name: "enti"
    config: "../anagrafica/anag-enti/dataset.yml"
    years: [2026]
  - name: "codgest_uscite"
    config: "../anagrafica/anag-codgest-uscite/dataset.yml"
    years: [2026]
  - name: "regprov"
    config: "../anagrafica/anag-reg-prov/dataset.yml"
    years: [2026]
